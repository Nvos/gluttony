version: "2"
sql:
- name: postgresql-recipe
  engine: postgresql
  queries: internal/recipe/query.sql
  schema: internal/database/migrations
  gen:
    go:
      package: postgresql
      out: internal/recipe/postgresql
      sql_package: "pgx/v5"
- name: postgresql-user
  engine: postgresql
  queries: internal/user/query.sql
  schema: internal/database/migrations
  gen:
    go:
      package: postgresql
      out: internal/user/postgresql
      sql_package: "pgx/v5"