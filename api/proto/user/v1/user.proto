syntax = "proto3";

package user.v1;
option go_package = "gluttony/internal/proto/user/v1;userv1";

message User {
  string id = 1;
  string username = 2;
}

message LoginRequest  {
  string username = 1;
  string password = 2;
}

message LoginResponse  {
  User user = 1;
}

service UserService {
  rpc Login(LoginRequest) returns (LoginResponse);
}