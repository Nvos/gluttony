syntax = "proto3";

package recipe.v1;
option go_package = "gluttony/internal/proto/recipe/v1;recipev1";

message Recipe {
  string id = 1;
  string name = 2;
}

message GetRecipeRequest  {
  int32 id = 1;
}

message GetRecipeResponse  {
  Recipe recipe = 1;
}

service RecipeService {
  rpc GetRecipe(GetRecipeRequest) returns (GetRecipeResponse);
}